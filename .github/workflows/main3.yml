name: RDB 3

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Create Windows User
        run: |
          New-LocalUser -Name "newuser" `
          -Password (ConvertTo-SecureString "Duythanh123." -AsPlainText -Force) `
          -FullName "New User" `
          -Description "Description of New User" `
          -AccountNeverExpires
      - name: Grant Admin Rights
        run: Add-LocalGroupMember -Group "Administrators" -Member "newuser"

      - name: Enable Remote Desktop
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 1
      - uses: actions/checkout@v3

      - name: Set up Python 3.10
        uses: actions/setup-python@v3
        with:
          python-version: "3.10"
    
      - name: Download & unzip artifacts (multi-repo, optimized)
        env:
          GH_TOKEN: ${{ secrets.AUTH_GITHUB_TOKEN }}
        run: |
          # Danh sách repo
          $repos = @(
            "haviglperecso40k/tik_tok_record_private",
            "Juliolayme/https---github.com-Juliolayme-tiktok_record_v6.8"
          )
      
          # Ngày hôm qua (UTC)
          $yesterday = (Get-Date).ToUniversalTime().AddDays(-1).ToString("yyyy-MM-dd")
      
          # Đường dẫn ổ D
          $basePath = "D:\artifacts\$yesterday"
          New-Item -ItemType Directory -Force -Path $basePath | Out-Null
      
          # Kiểm tra dung lượng ổ D (>= 5GB)
          $drive = Get-PSDrive D
          if ($drive.Free -lt 5GB) {
              Write-Error "Ổ D không đủ dung lượng!"
              exit 1
          }
      
          $allRuns = @()
      
          # Lấy run từ tất cả repo (song song nhẹ)
          foreach ($repo in $repos) {
              Write-Host "Fetching runs from $repo"
      
              $runs = gh run list -R $repo --limit 50 --json databaseId,createdAt | ConvertFrom-Json
      
              $filtered = $runs | Where-Object {
                  (Get-Date $_.createdAt).ToString("yyyy-MM-dd") -eq $yesterday
              }
      
              foreach ($run in $filtered) {
                  $allRuns += [PSCustomObject]@{
                      repo = $repo
                      id   = $run.databaseId
                  }
              }
          }
      
          Write-Host "Total runs: $($allRuns.Count)"
      
          # Download song song (tối đa 6 luồng)
          $allRuns | ForEach-Object -Parallel {
              $repo = $_.repo
              $id   = $_.id
              $basePath = $using:basePath
      
              $runPath = "$basePath\$($repo.Replace('/','_'))\$id"
              New-Item -ItemType Directory -Force -Path $runPath | Out-Null
      
              Write-Host "Downloading $repo → run $id"
      
              gh run download $id -R $repo -D $runPath
      
              # Giải nén song song trong từng run
              Get-ChildItem -Path $runPath -Filter *.zip | ForEach-Object {
                  $dest = $_.FullName.Replace(".zip","")
                  Expand-Archive -Path $_.FullName -DestinationPath $dest -Force
              }
      
              # Xóa zip để tiết kiệm dung lượng
              Remove-Item "$runPath\*.zip" -Force -ErrorAction SilentlyContinue
      
          } -ThrottleLimit 6
      - name: Write tunnel script
        run: |
          Set-Content tunnel.py "import ngrok, time, os"
          Add-Content tunnel.py "listener = ngrok.forward(3389, authtoken=os.environ['NGROK_AUTH_TOKEN'], proto='tcp')"
          Add-Content tunnel.py "print('RDP Address:', listener.url())"
          Add-Content tunnel.py "time.sleep(36000)"
      - name: Install and Run ngrok
        env:
          NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
        run: |
          pip install ngrok
          python tunnel.py
